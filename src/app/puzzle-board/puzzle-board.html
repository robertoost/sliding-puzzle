<div class="puzzle-container">
  <div class="puzzle-header">
    <h1 (click)="titleClick()">4x4 Sliding Puzzle</h1>
    <div class="stats">
      <div class="stat">
        <span class="label">Moves:</span>
        <span class="value">{{ moveCount() }}</span>
      </div>
      <button class="reset-btn" (click)="resetPuzzle()">Reset Puzzle</button>
    </div>
  </div>

  @if (isComplete()) {
  <div class="completion-message">
    <h2>Congratulations!</h2>
    <p>You completed the puzzle in {{ moveCount() }} moves!</p>
  </div>
  }

  <div class="puzzle-board">
    @for (tile of boardPositions(); track tile ? tile.value : $index) { @if
    (tile) {
    <app-tile
      [tile]="tile"
      [isMovable]="canMoveTile(tile.currentPosition)"
      [imagePath]="imagePath"
      (clicked)="onTileClick($event)"
    >
    </app-tile>
    } @else {
    <div class="empty-slot"></div>
    } }
  </div>
</div>
